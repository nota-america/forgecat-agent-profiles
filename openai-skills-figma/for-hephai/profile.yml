name: figma
version: "0.0.0"
description: >-
  Use the Figma MCP server to fetch design context, screenshots, variables,
  and assets from Figma, and to translate Figma nodes into production code.
  Trigger when a task involves Figma URLs, node IDs, design-to-code
  implementation, or Figma MCP setup and troubleshooting.

sourcePlatform: codex

compatibility:
  platforms:
    tested: [codex]
    partial: []
  models:
    recommended: [gpt-5.4]
    minimum: [gpt-4o]

skills:
  - name: figma
    path: skills/figma/SKILL.md
    description: >-
      Use the Figma MCP server to fetch design context, screenshots, variables,
      and assets from Figma, and to translate Figma nodes into production code.
      Trigger when a task involves Figma URLs, node IDs, design-to-code
      implementation, or Figma MCP setup and troubleshooting.

mcp:
  - name: figma
    type: streamable_http
    url: https://mcp.figma.com/mcp
    description: "Figma MCP server — design context, screenshots, variables, assets, code connect"
    requiredEnv:
      - name: FIGMA_OAUTH_TOKEN
        description: "Figma OAuth token for API authentication"
        optional: false
