name: cursor-gitlab-plugin
version: 0.0.0
description: Connect Cursor to GitLab with the GitLab MCP server. Plan, track, and manage issues, merge requests, and pipelines from your editor.
repository: https://github.com/nickveenhof/cursor-gitlab-plugin
license: MIT
compatibility:
  platforms:
    tested:
      - cursor
    partial:
      - claude-code
      - codex
  models:
    recommended: []
    minimum: []
agents:
  - name: gitlab-assistant
    description: GitLab Assistant — AI agent with product management capabilities that uses the GitLab MCP server for Agile planning, prioritization, delivery tracking, and stakeholder communication. Refers to Duo Agent Platform agents and flows for specialized tasks.
    path: agents/gitlab-assistant.md
skills:
  - name: gitlab-ci-author
    description: Write, debug, and optimize GitLab CI/CD pipeline configuration files.
    path: skills/gitlab-ci-author/SKILL.md
commands:
  - name: backlog-health
    description: Analyze the backlog for staleness, missing labels, and unassigned work.
    path: commands/backlog-health.md
  - name: create-issue
    description: Create a GitLab issue with labels and milestone using the MCP server.
    path: commands/create-issue.md
  - name: create-merge-request
    description: Create a GitLab merge request from the current branch using the MCP server.
    path: commands/create-merge-request.md
  - name: pipeline-status
    description: Check CI/CD pipeline health and drill into failed jobs.
    path: commands/pipeline-status.md
  - name: plan-sprint
    description: Analyze open issues and suggest sprint scope and priorities.
    path: commands/plan-sprint.md
  - name: review-merge-request
    description: Review a GitLab merge request — summarize changes, check pipelines, and flag concerns.
    path: commands/review-merge-request.md
rules:
  - description: GitLab development workflow conventions
    path: rules/gitlab-workflow.mdc
mcp:
  path: mcp.jsonc
